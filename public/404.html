<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Not in the book · Parallel Scripture</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" href="/icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
    <style>
      :root { --ink:#231408; --sepia:#5a3b1f; --vellum:#f4ead2; --rubric:#8a2418; --gold:#a3812e; }
      html, body { margin: 0; height: 100%; background: #efe3c5; color: var(--ink); font-family: "EB Garamond", Georgia, serif; }
      .wrap { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 40px 20px; box-sizing: border-box; }
      .card {
        max-width: 520px; width: 100%; padding: 40px 36px;
        background: var(--vellum);
        border: 1px solid #c9b88e;
        box-shadow: inset 0 0 0 6px rgba(255, 247, 224, 0.4),
                    inset 0 0 0 7px rgba(163, 129, 46, 0.35),
                    0 20px 60px rgba(0, 0, 0, 0.25);
        text-align: center;
      }
      .eyebrow { font: 600 10px "Cinzel", serif; letter-spacing: 0.28em; text-transform: uppercase; color: var(--sepia); margin-bottom: 6px; }
      .orn { color: var(--gold); font-size: 22px; margin: 10px 0 14px; }
      h1 { font-family: "EB Garamond", serif; font-style: italic; font-size: 30px; margin: 0 0 6px; color: var(--ink); font-weight: 500; }
      p { font-size: 16px; color: var(--sepia); line-height: 1.6; margin: 0 0 22px; }
      a.cta {
        display: inline-block; padding: 10px 22px;
        background: var(--rubric); color: var(--vellum); text-decoration: none;
        border: 1px solid #5e1a12; border-radius: 2px;
        font: 600 11px "Cinzel", serif; letter-spacing: 0.2em; text-transform: uppercase;
      }
      a.cta:hover { background: #5e1a12; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="eyebrow">Parallel · Scripture</div>
        <div class="orn">&#10086;</div>
        <h1>This page is not in the book.</h1>
        <p>The page you came for has moved or never existed. Check the address, or step back to your desk.</p>
        <a class="cta" href="/">Return to The Scriptorium</a>
      </div>
    </div>
  </body>
</html>
